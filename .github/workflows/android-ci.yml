name: Android Pro CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Verify Gradle wrapper
        run: ./gradlew wrapper --no-daemon --stacktrace

      - name: Compile Kotlin
        run: ./gradlew compileDebugKotlin --no-daemon --stacktrace --info --warning-mode all

      - name: Process resources
        run: ./gradlew processDebugResources --no-daemon --stacktrace --info --warning-mode all

      - name: Lint project
        run: ./gradlew lintDebug --no-daemon --stacktrace --info --warning-mode all

  build:
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace --info --warning-mode all

      - name: Build Release Bundle
        run: ./gradlew bundleRelease --no-daemon --stacktrace --info --warning-mode all

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TaskPulse-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: TaskPulse-release
          path: app/build/outputs/bundle/release/*.aab

      - name: Upload reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-reports
          path: |
            **/build/reports/
            **/build/outputs/logs/
