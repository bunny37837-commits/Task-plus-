name: Android Pro CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          add-job-summary: on-failure
          build-scan-publish: true
          build-scan-terms-of-use-url: https://gradle.com/terms-of-service
          build-scan-terms-of-use-agree: "yes"

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Compile Kotlin
        id: compile_kotlin
        run: |
          ./gradlew compileDebugKotlin --no-daemon --stacktrace 2>&1 | tee compile-kotlin.log
          exit ${PIPESTATUS[0]}

      - name: Show Kotlin errors
        if: failure()
        run: |
          echo "========== KOTLIN ERRORS =========="
          grep -E "^e:|error:|Unresolved reference|Type mismatch|Expecting|None of the following|Overload resolution" compile-kotlin.log || cat compile-kotlin.log | tail -100
          echo "==================================="

      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-logs
          path: compile-kotlin.log

