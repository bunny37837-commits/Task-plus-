name: Android Pro CI

on:
  pull_request:
    branches: [ main, master ]
    paths:
      - 'app/**'
      - 'gradle/**'
      - 'build.gradle*'
      - 'settings.gradle*'
      - 'gradle.properties'
      - 'gradlew'
      - 'gradlew.bat'
      - '.github/workflows/**'
  push:
    branches: [ main, master ]
    paths:
      - 'app/**'
      - 'gradle/**'
      - 'build.gradle*'
      - 'settings.gradle*'
      - 'gradle.properties'
      - 'gradlew'
      - 'gradlew.bat'
      - '.github/workflows/**'

concurrency:
  group: android-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          add-job-summary: on-failure
          build-scan-publish: true
          build-scan-terms-of-use-url: https://gradle.com/terms-of-service
          build-scan-terms-of-use-agree: "yes"

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Gradle sanity
        id: gradle_sanity
        shell: bash
        run: |
          set -o pipefail
          ./gradlew help --no-daemon --stacktrace --warning-mode all 2>&1 | tee gradle-help.log

      - name: Lint Debug
        id: lint
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          ./gradlew lintDebug --no-daemon --stacktrace --warning-mode all 2>&1 | tee lint.log

      - name: Unit Tests
        id: unit_tests
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          ./gradlew testDebugUnitTest --no-daemon --stacktrace --warning-mode all 2>&1 | tee unit-tests.log

      - name: Assemble Debug
        id: assemble
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          ./gradlew assembleDebug --no-daemon --stacktrace --info --warning-mode all 2>&1 | tee assemble.log

      - name: Write CI summary
        if: always()
        shell: bash
        run: |
          {
            echo "# Android CI Summary"
            echo ""
            echo "| Step | Result |"
            echo "|---|---|"
            echo "| Gradle sanity | ${{ steps.gradle_sanity.outcome }} |"
            echo "| Lint Debug | ${{ steps.lint.outcome }} |"
            echo "| Unit Tests | ${{ steps.unit_tests.outcome }} |"
            echo "| Assemble Debug | ${{ steps.assemble.outcome }} |"
            echo ""
            echo "## Failure hints"
            echo ""
            echo "### Lint"
            echo '```text'
            grep -B2 -A6 -m 10 -E "ERROR:|Execution failed for task|Lint found errors" lint.log || true
            echo '```'
            echo ""
            echo "### Unit Tests"
            echo '```text'
            grep -B2 -A8 -m 10 -E "FAILED|FAILURE:|Execution failed for task|There were failing tests" unit-tests.log || true
            echo '```'
            echo ""
            echo "### Assemble"
            echo '```text'
            grep -B3 -A8 -m 12 -E "e: |ERROR:|Execution failed for task|Unresolved reference|Type mismatch|No value passed|Expecting" assemble.log || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Annotate Kotlin/Gradle errors
        if: always()
        shell: bash
        run: |
          set +e
          for f in lint.log unit-tests.log assemble.log; do
            [ -f "$f" ] || continue
            while IFS= read -r line; do
              if [[ "$line" =~ ^e:\ ([^:]+):([0-9]+):([0-9]+):\ (.*)$ ]]; then
                file="${BASH_REMATCH[1]}"
                ln="${BASH_REMATCH[2]}"
                col="${BASH_REMATCH[3]}"
                msg="${BASH_REMATCH[4]}"
                echo "::error file=$file,line=$ln,col=$col::$msg"
              elif [[ "$line" =~ ^e:\ ([^:]+):([0-9]+):\ (.*)$ ]]; then
                file="${BASH_REMATCH[1]}"
                ln="${BASH_REMATCH[2]}"
                msg="${BASH_REMATCH[3]}"
                echo "::error file=$file,line=$ln::$msg"
              fi
            done < "$f"
          done

      - name: Fail job if any verification step failed
        if: always()
        shell: bash
        run: |
          test "${{ steps.lint.outcome }}" = "success" \
            && test "${{ steps.unit_tests.outcome }}" = "success" \
            && test "${{ steps.assemble.outcome }}" = "success"

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
          retention-days: 14

      - name: Upload reports and logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-ci-reports-and-logs
          path: |
            **/build/reports/**
            **/build/test-results/**
            *.log
          if-no-files-found: warn
          retention-days: 14
