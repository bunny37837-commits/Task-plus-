name: Android CI Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Compile Kotlin
        run: ./gradlew compileDebugKotlin --no-daemon --stacktrace --info --warning-mode all

      - name: Process Resources
        run: ./gradlew processDebugResources --no-daemon --stacktrace --info --warning-mode all

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace --info --warning-mode all

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: TaskPulse-debug
          path: app/build/outputs/apk/debug/*.apk
